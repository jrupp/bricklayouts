<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication - BrickLayouts</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .message {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="message">
    <div class="spinner"></div>
    <p>Completing authentication...</p>
  </div>

  <script>
    // Authorization code flow: code arrives as a query parameter (?code=...)
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const error = urlParams.get('error');
    const errorDescription = urlParams.get('error_description');

    function sendMessage(msg) {
      if (window.opener) {
        window.opener.postMessage(msg, window.location.origin);
        setTimeout(() => window.close(), 1500);
      } else {
        // No opener window - redirect to main app with the code
        // so handleOAuthCallback can process it
        window.location.href = '/?code=' + encodeURIComponent(code);
      }
    }

    if (error) {
      sendMessage({ type: 'oauth-error', error: errorDescription || error });
    } else if (code) {
      sendMessage({ type: 'oauth-success', code: code });
    } else {
      sendMessage({ type: 'oauth-error', error: 'No authentication data received' });
    }
  </script>
</body>
</html>
