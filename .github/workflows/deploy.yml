name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::326269142220:role/bricklayouts-GitHubFrontendDeploy
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://bricklayouts-app/ \
            --delete \
            --exclude '.git/*' \
            --exclude 'node_modules/*' \
            --exclude 'spec/*' \
            --exclude 'scripts/*' \
            --exclude '.devcontainer/*' \
            --exclude '.kiro/*' \
            --exclude '.vscode/*' \
            --exclude '.github/*' \
            --exclude '.cloud-private/*' \
            --exclude 'src/cloud/*' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'backup-lock.json' \
            --exclude 'CLAUDE.md' \
            --exclude '.gitignore' \
            --exclude 'CNAME' \
            --exclude 'LICENSE.txt'

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3UQ5CNV5TAIT0 \
            --paths '/*'
